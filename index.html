<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/default-pfp.jpeg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f97316" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Stonk Market</title>
    <meta
      name="description"
      content="Stonk Market - Trade tokens on the decentralized exchange"
    />
    <meta name="author" content="Stonk Market" />

    <meta property="og:title" content="Stonk Market" />
    <meta
      property="og:description"
      content="Stonk Market - Trade tokens on the decentralized exchange"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/default-pfp.jpeg" id="og-image" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@stonkmarket" />
    <meta name="twitter:image" content="/default-pfp.jpeg" id="twitter-image" />
    <script>
      // Convert relative image URLs to absolute URLs for social media crawlers
      (function () {
        const baseUrl = window.location.origin;
        const ogImage = document.querySelector('meta[property="og:image"]');
        const twitterImage = document.querySelector(
          'meta[name="twitter:image"]'
        );
        if (ogImage && ogImage.content && !ogImage.content.startsWith("http")) {
          ogImage.content = baseUrl + ogImage.content;
        }
        if (
          twitterImage &&
          twitterImage.content &&
          !twitterImage.content.startsWith("http")
        ) {
          twitterImage.content = baseUrl + twitterImage.content;
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
